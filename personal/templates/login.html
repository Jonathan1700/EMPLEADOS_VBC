{% extends 'base.html' %}
{% block title %}Iniciar sesión{% endblock %}
{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-4">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h1 class="text-center fw-light mb-4">Iniciar sesión</h1>

                    {% if form.errors %}
                    <div class="alert alert-danger" role="alert">
                        Usuario o contraseña incorrectos.
                    </div>
                    {% endif %}

                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="{{ form.username.id_for_label }}" class="form-label">Usuario</label>
                            <input type="text" name="{{ form.username.name }}"
                                   id="{{ form.username.id_for_label }}"
                                   class="form-control" autofocus required>
                        </div>
                        <div class="mb-3">
                            <label for="{{ form.password.id_for_label }}" class="form-label">Contraseña</label>
                            <input type="password" name="{{ form.password.name }}"
                                   id="{{ form.password.id_for_label }}"
                                   class="form-control" required>
                        </div>
                        <input type="hidden" name="next" value="{{ next }}">
                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-dark">Entrar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
